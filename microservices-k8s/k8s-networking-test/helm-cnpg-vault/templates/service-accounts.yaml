# Per-service ServiceAccounts (required for Linkerd mTLS identity-based auth)
{{- $ns := include "ecommerce.namespace" . }}
{{- range $sa := list "product-service" "user-service" "cart-service" "order-service" "payment-service" "notification-service" "api-gateway" "frontend" "redis" "rabbitmq" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa }}
  namespace: {{ $ns }}
  labels:
    {{- include "ecommerce.labels" $ | nindent 4 }}
{{- end }}
