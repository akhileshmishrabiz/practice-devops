# Seed job - calls API gateway to load catalog data
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seed-job-policy
  namespace: ecommerce
spec:
  podSelector:
    matchLabels:
      app: seed-data-job
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 80
