# Stage 3: Authenticated test as a Kubernetes Job
# The ConfigMap holds TWO files: the scenario and the auth lib it imports.
# Both get mounted at /scripts/ so the relative import './auth.lib.js'
# resolves correctly.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-auth-script
  namespace: ecommerce
  labels:
    app: k6
    stage: auth
data:
  auth.js: |
    // Placeholder — populated at run time
  auth.lib.js: |
    // Placeholder — populated at run time
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-auth
  namespace: ecommerce
  labels:
    app: k6
    stage: auth
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: k6
        stage: auth
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.49.0
          args: ["run", "--out", "experimental-prometheus-rw", "/scripts/auth.js"]
          env:
            - name: BASE_URL
              value: "http://api-gateway.ecommerce.svc.cluster.local"
            - name: K6_PROMETHEUS_RW_SERVER_URL
              value: "http://prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
            - name: K6_PROMETHEUS_RW_TREND_STATS
              value: "p(95),p(99),min,max,avg,count"
            - name: K6_PROMETHEUS_RW_PUSH_INTERVAL
              value: "5s"
            - name: K6_PROMETHEUS_RW_STALE_MARKERS
              value: "true"
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      volumes:
        - name: script
          configMap:
            name: k6-auth-script
