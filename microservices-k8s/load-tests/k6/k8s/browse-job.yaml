# Stage 2: Browse products as a Kubernetes Job
# Same pattern as Stage 1 — ConfigMap holds the JS, Job runs k6.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-browse-script
  namespace: ecommerce
  labels:
    app: k6
    stage: browse
data:
  browse-products.js: |
    // Placeholder — populated at run time by load-test.sh
    // from load-tests/k6/scenarios/browse-products.js
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-browse
  namespace: ecommerce
  labels:
    app: k6
    stage: browse
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: k6
        stage: browse
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.49.0
          args: ["run", "--out", "experimental-prometheus-rw", "/scripts/browse-products.js"]
          env:
            - name: BASE_URL
              value: "http://api-gateway.ecommerce.svc.cluster.local"
            - name: K6_PROMETHEUS_RW_SERVER_URL
              value: "http://prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
            - name: K6_PROMETHEUS_RW_TREND_STATS
              value: "p(95),p(99),min,max,avg,count"
            - name: K6_PROMETHEUS_RW_PUSH_INTERVAL
              value: "5s"
            - name: K6_PROMETHEUS_RW_STALE_MARKERS
              value: "true"
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      volumes:
        - name: script
          configMap:
            name: k6-browse-script
