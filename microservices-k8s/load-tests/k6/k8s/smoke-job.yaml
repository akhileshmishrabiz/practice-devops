# Stage 1: Smoke test as a Kubernetes Job
#
# How this works:
#   1. ConfigMap holds the k6 JS script (no docker image rebuild needed
#      when you change the script — just re-apply the ConfigMap).
#   2. Job runs the official grafana/k6 image, mounting the script
#      from the ConfigMap, and executes `k6 run /scripts/smoke.js`.
#   3. Job runs once. To re-run, delete and re-apply (the runner script
#      does this for you).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-smoke-script
  namespace: ecommerce
  labels:
    app: k6
    stage: smoke
data:
  # This is populated by the runner script via --from-file, so this
  # file in git stays the source of truth. Leaving an empty placeholder
  # so `kubectl apply -f` on this file alone won't error if you ever do.
  smoke.js: |
    // Placeholder — populated at run time by load-test.sh
    // from load-tests/k6/smoke.js
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-smoke
  namespace: ecommerce
  labels:
    app: k6
    stage: smoke
spec:
  # Don't auto-delete — we want to read logs after completion.
  ttlSecondsAfterFinished: 600
  backoffLimit: 0  # don't retry on failure; we want to see the error
  template:
    metadata:
      labels:
        app: k6
        stage: smoke
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.49.0
          args: ["run", "--out", "experimental-prometheus-rw", "/scripts/smoke.js"]
          env:
            # In-cluster DNS for the gateway. The script falls back to
            # this if BASE_URL isn't set, but we set it explicitly for
            # clarity and so it's easy to change later.
            - name: BASE_URL
              value: "http://api-gateway.ecommerce.svc.cluster.local"
            # Push k6 metrics to the cluster Prometheus via remote-write.
            # Prom was started with --web.enable-remote-write-receiver.
            - name: K6_PROMETHEUS_RW_SERVER_URL
              value: "http://prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
            - name: K6_PROMETHEUS_RW_TREND_STATS
              value: "p(95),p(99),min,max,avg,count"
            - name: K6_PROMETHEUS_RW_PUSH_INTERVAL
              value: "5s"
            # STALE_MARKERS makes series disappear from queries after the
            # test ends, instead of looking flat-lined at the last value.
            - name: K6_PROMETHEUS_RW_STALE_MARKERS
              value: "true"
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: script
          configMap:
            name: k6-smoke-script
